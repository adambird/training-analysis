# Copy to races.yml (gitignored) and list your races. Used by bin/fitness
# for race-day analysis (each race ranked against training rides as percentiles).
#
# The longest ride on each date is treated as the race; shorter same-day rides
# are warm-ups. role: key = target race, prep = preparation race (optional).
# name is optional but helpful in the report.
races:
  - date: 2026-04-25
    name: Example Spring Gravel
    role: prep
  - date: 2026-09-12
    name: Example Championship
    role: key
